type RootQueryType {
  health: String!
  operatorWorkflowItems(after: String, first: Int!): OperatorWorkflowItemConnection
  operatorWorkflowItem(id: ID!): OperatorWorkflowItem!
  operatorRelationshipDetails(after: String, first: Int!, id: ID!): OperatorRelationshipDetailConnection
  operatorPacketReadiness(input: OperatorPacketReadinessInput!): OperatorPacketReadiness!
  operatorPacketWorkspace(id: ID!): OperatorPacketWorkspace!
  operatorPacketCreateAffordance: OperatorCommandAffordance!
  operatorManualIntakeAffordance: OperatorCommandAffordance!
  operatorRunState(id: ID!): OperatorRunState!
  operatorRunCommandOptionPage(after: String, first: Int!, id: ID!, kind: String!): OperatorRunCommandOptionChoiceConnection
  operatorVerificationOutcome(id: ID!): OperatorVerificationOutcome!
  node(
    "The ID of an object."
    id: ID!
  ): Node
  getWorkRun(
    "The id of the record"
    id: ID!
  ): WorkRun
  listWorkRuns(
    "How to sort the records in the response"
    sort: [WorkRunSortInput]

    "A filter to limit the results"
    filter: WorkRunFilterInput

    "The number of records to return from the beginning. Maximum 250"
    first: Int

    "Show records before the specified keyset."
    before: String

    "Show records after the specified keyset."
    after: String

    "The number of records to return to the end. Maximum 250"
    last: Int
  ): WorkRunConnection
  getWorkPacket(
    "The id of the record"
    id: ID!
  ): WorkPacket
  listWorkPackets(
    "How to sort the records in the response"
    sort: [WorkPacketSortInput]

    "A filter to limit the results"
    filter: WorkPacketFilterInput

    "The number of records to return from the beginning. Maximum 250"
    first: Int

    "Show records before the specified keyset."
    before: String

    "Show records after the specified keyset."
    after: String

    "The number of records to return to the end. Maximum 250"
    last: Int
  ): WorkPacketConnection
  getSignal(
    "The id of the record"
    id: ID!
  ): Signal
  listSignals(
    "How to sort the records in the response"
    sort: [SignalSortInput]

    "A filter to limit the results"
    filter: SignalFilterInput

    "The number of records to return from the beginning. Maximum 250"
    first: Int

    "Show records before the specified keyset."
    before: String

    "Show records after the specified keyset."
    after: String

    "The number of records to return to the end. Maximum 250"
    last: Int
  ): SignalConnection
}

type RootMutationType {
  submitManualIntake(input: SubmitManualIntakeInput!): SubmitManualIntakePayload!
  applyProposedChanges(input: ApplyProposedChangesInput!): ApplyProposedChangesPayload!
  createWorkPacket(input: CreateWorkPacketInput!): CreateWorkPacketPayload!
  createWorkPacketVersion(input: CreateWorkPacketVersionInput!): CreateWorkPacketVersionPayload!
  startWorkRun(input: StartWorkRunInput!): StartWorkRunPayload!
  recordExecutionObservation(input: RecordExecutionObservationInput!): RecordExecutionObservationPayload!
  createEvidenceCandidate(input: CreateEvidenceCandidateInput!): CreateEvidenceCandidatePayload!
  acceptEvidence(input: AcceptEvidenceInput!): AcceptEvidencePayload!
  waiveVerificationCheck(input: WaiveVerificationCheckInput!): WaiveVerificationCheckPayload!
}

"""
The `DateTime` scalar type represents a date and time in the UTC
timezone. The DateTime appears in a JSON response as an ISO8601 formatted
string, including UTC timezone ("Z"). The parsed date and time string will
be converted to UTC if there is an offset.
"""
scalar DateTime

